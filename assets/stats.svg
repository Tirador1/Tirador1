<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 195" width="850" height="195">
  <style>
    @keyframes metricIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .metric { opacity:0; animation: metricIn 0.5s ease forwards; }
    .title { fill:#e6edf3; font-family:ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace; font-size:16px; font-weight:bold; letter-spacing:1px; }
    .subtitle { fill:#6e7681; font-family:ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace; font-size:11px; }
  </style>
  <rect width="850" height="195" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text class="title" x="425" y="28" text-anchor="middle">GitHub Activity</text>
  <text class="subtitle" x="425" y="43" text-anchor="middle">Contributions &amp; engagement metrics</text>
  
    <g class="metric" style="animation-delay:0.00s">
      <rect x="20" y="55" width="125" height="100" rx="10" fill="#161b22" stroke="#00f0ff22" stroke-width="1"/>
      <rect x="20" y="55" width="125" height="100" rx="10" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.15"/>
      <text x="82.5" y="97" text-anchor="middle" fill="#00f0ff" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="26" font-weight="bold">45</text>
      <text x="82.5" y="120" text-anchor="middle" fill="#6e7681" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="10">Total Commits</text>
      <circle cx="82.5" cy="137" r="3" fill="#00f0ff" opacity="0.6"/>
    </g>
    <g class="metric" style="animation-delay:0.15s">
      <rect x="157" y="55" width="125" height="100" rx="10" fill="#161b22" stroke="#bc8cff22" stroke-width="1"/>
      <rect x="157" y="55" width="125" height="100" rx="10" fill="none" stroke="#bc8cff" stroke-width="1" opacity="0.15"/>
      <text x="219.5" y="97" text-anchor="middle" fill="#bc8cff" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="26" font-weight="bold">5</text>
      <text x="219.5" y="120" text-anchor="middle" fill="#6e7681" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="10">Pull Requests</text>
      <circle cx="219.5" cy="137" r="3" fill="#bc8cff" opacity="0.6"/>
    </g>
    <g class="metric" style="animation-delay:0.30s">
      <rect x="294" y="55" width="125" height="100" rx="10" fill="#161b22" stroke="#3fb95022" stroke-width="1"/>
      <rect x="294" y="55" width="125" height="100" rx="10" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.15"/>
      <text x="356.5" y="97" text-anchor="middle" fill="#3fb950" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="26" font-weight="bold">2</text>
      <text x="356.5" y="120" text-anchor="middle" fill="#6e7681" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="10">Issues</text>
      <circle cx="356.5" cy="137" r="3" fill="#3fb950" opacity="0.6"/>
    </g>
    <g class="metric" style="animation-delay:0.45s">
      <rect x="431" y="55" width="125" height="100" rx="10" fill="#161b22" stroke="#f9731622" stroke-width="1"/>
      <rect x="431" y="55" width="125" height="100" rx="10" fill="none" stroke="#f97316" stroke-width="1" opacity="0.15"/>
      <text x="493.5" y="97" text-anchor="middle" fill="#f97316" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="26" font-weight="bold">1</text>
      <text x="493.5" y="120" text-anchor="middle" fill="#6e7681" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="10">Stars Earned</text>
      <circle cx="493.5" cy="137" r="3" fill="#f97316" opacity="0.6"/>
    </g>
    <g class="metric" style="animation-delay:0.60s">
      <rect x="568" y="55" width="125" height="100" rx="10" fill="#161b22" stroke="#f8514922" stroke-width="1"/>
      <rect x="568" y="55" width="125" height="100" rx="10" fill="none" stroke="#f85149" stroke-width="1" opacity="0.15"/>
      <text x="630.5" y="97" text-anchor="middle" fill="#f85149" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="26" font-weight="bold">52</text>
      <text x="630.5" y="120" text-anchor="middle" fill="#6e7681" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="10">Repositories</text>
      <circle cx="630.5" cy="137" r="3" fill="#f85149" opacity="0.6"/>
    </g>
    <g class="metric" style="animation-delay:0.75s">
      <rect x="705" y="55" width="125" height="100" rx="10" fill="#161b22" stroke="#3b82f622" stroke-width="1"/>
      <rect x="705" y="55" width="125" height="100" rx="10" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.15"/>
      <text x="767.5" y="97" text-anchor="middle" fill="#3b82f6" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="26" font-weight="bold">1</text>
      <text x="767.5" y="120" text-anchor="middle" fill="#6e7681" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="10">Contributed To</text>
      <circle cx="767.5" cy="137" r="3" fill="#3b82f6" opacity="0.6"/>
    </g>
</svg>