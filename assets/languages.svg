<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 280" width="850" height="280">
<style>
  @keyframes segGrow{from{stroke-dasharray:0 534.1}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes barIn{from{width:0}}
  .seg{animation:segGrow 1s ease forwards}
  .leg{opacity:0;animation:fadeUp .4s ease forwards}
  .minibar{animation:barIn .6s ease forwards}
  .title{fill:#e6edf3;font-family:ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace;font-size:16px;font-weight:bold;letter-spacing:1px;text-anchor:middle}
  .sub{fill:#6e7681;font-family:ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace;font-size:11px;text-anchor:middle}
  .center-num{fill:#00f0ff;font-family:ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace;font-size:28px;font-weight:bold;text-anchor:middle}
  .center-lbl{fill:#6e7681;font-family:ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace;font-size:10px;text-anchor:middle}
</style>
<rect width="850" height="280" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
<text class="title" x="425" y="28">Languages</text>
<text class="sub" x="425" y="44">By repository composition</text>
